<!DOCTYPE html>
<html>
<head>
    <title>Realistic 2D Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        canvas { display: block; margin: auto; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 600;
canvas.height = 400;

// Player
let player = {
    x: canvas.width / 2,
    y: canvas.height - 60,
    width: 40,
    height: 40,
    velocity: 0,
    speed: 0.5,
    friction: 0.9
};

// Obstacles
let obstacles = [];
let spawnRate = 1000;
let lastSpawn = 0;

// Controls
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Score
let score = 0;
let gameOver = false;

// Spawn obstacle
function spawnObstacle() {
    obstacles.push({
        x: Math.random() * (canvas.width - 30),
        y: -30,
        size: 20 + Math.random() * 30,
        speed: 2 + Math.random() * 3
    });
}

// Update
function update(time) {
    if (gameOver) return;

    // Movement physics
    if (keys["ArrowLeft"]) player.velocity -= player.speed;
    if (keys["ArrowRight"]) player.velocity += player.speed;

    player.velocity *= player.friction;
    player.x += player.velocity;

    // Boundaries
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width)
        player.x = canvas.width - player.width;

    // Spawn logic
    if (time - lastSpawn > spawnRate) {
        spawnObstacle();
        lastSpawn = time;

        // Increase difficulty
        if (spawnRate > 300) spawnRate -= 10;
    }

    // Move obstacles
    obstacles.forEach(o => {
        o.y += o.speed;

        // Collision
        if (
            player.x < o.x + o.size &&
            player.x + player.width > o.x &&
            player.y < o.y + o.size &&
            player.y + player.height > o.y
        ) {
            gameOver = true;
        }
    });

    // Remove off-screen
    obstacles = obstacles.filter(o => o.y < canvas.height);

    score++;
}

// Draw
function draw() {
    // Background gradient
    let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, "#0f2027");
    gradient.addColorStop(1, "#203a43");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Player (rounded + shadow)
    ctx.fillStyle = "cyan";
    ctx.shadowColor = "cyan";
    ctx.shadowBlur = 20;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.shadowBlur = 0;

    // Obstacles
    obstacles.forEach(o => {
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(o.x + o.size/2, o.y + o.size/2, o.size/2, 0, Math.PI * 2);
        ctx.fill();
    });

    // Score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 30);

    // Game Over
    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", canvas.width/2 - 120, canvas.height/2);
    }
}

// Game loop
function gameLoop(time = 0) {
    update(time);
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>s
